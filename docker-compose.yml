version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: timetable_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: university_secure_password_123
      POSTGRES_DB: timetable_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
